{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
{{- if and .Values.persistence.storageClass (eq .Values.persistence.storageClass "local-storage") }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "label-studio.fullname" . }}-data-pv
spec:
  capacity:
    storage: {{ .Values.persistence.size }}
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: {{ .Values.persistence.storageClass }}
  local:
    path: {{ .Values.persistence.storagePath | default "/opt/k8s/datamate" }}/data
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: {{ include "label-studio.fullname" . }}-data
    namespace: {{ .Release.Namespace | default "datamate" }}
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - {{ .Values.persistence.storageNode }}

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "label-studio.fullname" . }}-dataset-pv
spec:
  capacity:
    storage: {{ .Values.persistence.size }}
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: {{ .Values.persistence.storageClass }}
  local:
    path: {{ .Values.persistence.storagePath | default "/opt/k8s/datamate" }}/dataset
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: {{ include "label-studio.fullname" . }}-dataset
    namespace: {{ .Release.Namespace | default "datamate" }}
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - {{ .Values.persistence.storageNode }}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "label-studio.fullname" . }}-data
spec:
  accessModes:
    - ReadWriteOnce
  volumeName: {{ include "label-studio.fullname" . }}-data-pv
  volumeMode: Filesystem
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  storageClassName: {{ .Values.persistence.storageClass }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "label-studio.fullname" . }}-dataset
spec:
  accessModes:
    - ReadWriteOnce
  volumeName: {{ include "label-studio.fullname" . }}-dataset-pv
  volumeMode: Filesystem
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  storageClassName: {{ .Values.persistence.storageClass }}

{{- else }}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "label-studio.fullname" . }}-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "label-studio.fullname" . }}-dataset
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
{{- end }}

{{- end }}

