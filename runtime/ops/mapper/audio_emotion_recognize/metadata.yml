name: 'audioOps-语音情感识别'
name_en: 'audioOps-Speech Emotion Recognition'
description: '识别当前音频的 8 类语音情感，并把标注写入 ext_params.audio_emotion_recognize。'
description_en: 'Recognize 8 speech emotion classes for one audio sample and write ext_params.audio_emotion_recognize.'
language: 'python'
vendor: 'huawei'
raw_id: 'AudioEmotionRecognize'
version: '1.0.0'
types:
  - 'annotation'
modal: 'audio'
inputs: 'audio'
outputs: 'audio'
settings:
  hfModelDir:
    name: '模型目录'
    description: '包含 config.json、preprocessor_config.json 与 model.safetensors 的情感识别模型目录。'
    type: 'input'
    defaultVal: '/models/AudioOperations/emotion/new_model'
    required: false
runtime:
  memory: 4294967296
  cpu: 1.0
  gpu: 0
  npu: 0
  storage: 20MB
metrics:
  - name: '处理耗时'
    metric: '依输入音频长度与模型而定'
release:
  - '首次发布，支持单文件 8 类语音情感识别'
