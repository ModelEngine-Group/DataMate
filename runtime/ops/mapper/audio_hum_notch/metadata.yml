name: 'audioUtils-工频陷波'
name_en: 'audioUtils-Hum Notch Filter'
description: '50/60Hz 工频陷波抑制。需要 scipy.signal；处理音频并由 DataMate 统一导出结果。'
description_en: 'Notch filter for 50/60Hz hum suppression. Requires scipy.signal; process audio and let DataMate export the result.'
language: 'python'
vendor: 'huawei'
raw_id: 'AudioHumNotch'
version: '1.0.0'
types:
  - 'cleaning'
modal: 'audio'
inputs: 'audio'
outputs: 'audio'
settings:
  freqHz:
    name: '中心频率(Hz)'
    type: 'select'
    description: '工频中心频率。'
    defaultVal: '50'
    required: true
    options:
      - label: '50Hz'
        value: '50'
      - label: '60Hz'
        value: '60'
  q:
    name: 'Q'
    type: 'slider'
    description: '陷波品质因数，越大越窄。'
    defaultVal: 30
    min: 1
    max: 200
    step: 1
runtime:
  memory: 104857600
  cpu: 0.2
  gpu: 0
  npu: 0
  storage: 10MB

metrics:
  - name: '处理耗时'
    metric: '依输入音频长度与运行环境而定'
release:
  - '首次发布'
