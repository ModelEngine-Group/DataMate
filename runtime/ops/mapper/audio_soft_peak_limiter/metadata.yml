name: 'audioUtils-软限幅'
name_en: 'audioUtils-Soft Peak Limiter'
description: '软饱和限制峰值（tanh 近似），减轻硬削波。处理音频并由 DataMate 统一导出结果。'
description_en: 'Soft limiting using tanh-like saturation to reduce clipping. Process audio and let DataMate export the result.'
language: 'python'
vendor: 'huawei'
raw_id: 'AudioSoftPeakLimiter'
version: '1.0.0'
types:
  - 'cleaning'
modal: 'audio'
inputs: 'audio'
outputs: 'audio'
settings:
  threshold:
    name: '阈值'
    type: 'slider'
    description: '线性区阈值（0~1）。'
    defaultVal: 0.92
    min: 0.1
    max: 1
    step: 0.01
  knee:
    name: 'knee'
    type: 'slider'
    description: '过渡宽度（0~1），越大越柔和。'
    defaultVal: 0.08
    min: 0
    max: 1
    step: 0.01
runtime:
  memory: 104857600
  cpu: 0.12
  gpu: 0
  npu: 0
  storage: 10MB

metrics:
  - name: '处理耗时'
    metric: '依输入音频长度与运行环境而定'
release:
  - '首次发布'
