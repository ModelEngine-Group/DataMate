name: 'audioOps-音频场景分类'
name_en: 'audioOps-Audio Sound Classification'
description: '调用 AST AudioSet 预训练模型识别当前音频的声音类别；标注写入 ext_params.audio_sound_classify，并保持音频作为输出。'
description_en: 'Classify one audio sample with an AST AudioSet model; write ext_params.audio_sound_classify and keep the audio as output.'
language: 'python'
vendor: 'huawei'
raw_id: 'AudioSoundClassify'
version: '1.0.0'
types:
  - 'annotation'
modal: 'audio'
inputs: 'audio'
outputs: 'audio'
settings:
  astCheckpoint:
    name: 'AST 模型路径'
    description: 'AST AudioSet checkpoint 路径。'
    type: 'input'
    defaultVal: '/models/AudioOperations/recog/audioset_10_10_0.4593.pth'
    required: false
  astMacroMap:
    name: 'AST 大类映射表'
    description: '粗类映射 JSON；留空使用算子内置映射。'
    type: 'input'
    defaultVal: ''
    required: false
  labelsCsv:
    name: 'AudioSet 标签表'
    description: 'class_labels_indices.csv；留空使用算子内置标签表。'
    type: 'input'
    defaultVal: ''
    required: false
  topK:
    name: '细类 TopK'
    type: 'inputNumber'
    description: '输出 AudioSet 细类数量。'
    defaultVal: 10
    min: 1
    max: 50
    step: 1
  segmentSeconds:
    name: 'AST 分段秒数'
    type: 'inputNumber'
    description: '滑窗分段长度。'
    defaultVal: 10.24
    min: 1
    max: 120
    step: 0.01
  hopSeconds:
    name: 'AST 步长秒数'
    type: 'inputNumber'
    description: '滑窗步长。'
    defaultVal: 5.12
    min: 0.1
    max: 120
    step: 0.01
  macroAgg:
    name: 'AST 大类聚合'
    description: '将细类聚合成大类的策略。'
    type: 'select'
    defaultVal: 'max'
    required: true
    options:
      - label: 'max'
        value: 'max'
      - label: 'sum'
        value: 'sum'
runtime:
  memory: 4294967296
  cpu: 1.0
  gpu: 0
  npu: 0
  storage: 20MB
metrics:
  - name: '处理耗时'
    metric: '依输入音频长度与模型而定'
release:
  - '首次发布，支持 AST AudioSet 声音分类'
