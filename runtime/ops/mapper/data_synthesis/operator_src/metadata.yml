name: 'data_synthesis'
description: 'Call the standalone data_synthesis HTTP service and export one JSON result file.'
language: 'python'
vendor: 'huawei'
raw_id: 'DataSynthesisMapper'
version: '1.0.0'
modal: 'text'
inputs: 'text'
outputs: 'text'
types:
  - 'annotation'
release:
  - 'Initial standalone-service wrapper for acceptance platform.'
metrics:
  - name: 'Output'
    metric: '1 JSON file per input text file'
runtime:
  memory: 1073741824
  cpu: 0.5
  gpu: 0
  npu: 0
settings:
  serviceUrl:
    name: 'Service URL'
    description: 'HTTP endpoint of the standalone data_synthesis service.'
    type: 'input'
    defaultVal: 'http://data-synthesis-service:18103'
    required: true
  serviceUrls:
    name: 'Service URL Pool'
    description: 'Optional comma-separated hot service pool, for example http://data-synthesis-service:18103,http://data-synthesis-service-2:18103 . When provided, requests rotate across these services.'
    type: 'input'
    defaultVal: ''
    required: false
  taskTypes:
    name: 'Task Types'
    description: 'Comma-separated task types. Supported values: QA, CoT, Preference.'
    type: 'input'
    defaultVal: 'QA,CoT,Preference'
    required: true
  includeMetrics:
    name: 'Include Metrics'
    description: 'Whether to include evaluator and requirement metrics in the JSON response. Keep disabled for platform batch tests to avoid serial model queue timeout.'
    type: 'switch'
    defaultVal: 'false'
    required: false
    checkedLabel: 'true'
    unCheckedLabel: 'false'
  timeoutSec:
    name: 'Timeout'
    description: 'HTTP request timeout in seconds.'
    type: 'input'
    defaultVal: '3600'
    required: true
  lockWaitTimeoutSec:
    name: 'Lock Wait Timeout'
    description: 'Maximum seconds a Ray worker waits for the single-service call lock before failing. Keep this larger than a full platform batch queue.'
    type: 'input'
    defaultVal: '7200'
    required: true
  useServiceLock:
    name: 'Use Service Lock'
    description: 'Whether to enable per-service file locking in the operator. Default false so Ray workers can use multiple hot service instances in parallel.'
    type: 'switch'
    defaultVal: 'false'
    required: false
    checkedLabel: 'true'
    unCheckedLabel: 'false'
