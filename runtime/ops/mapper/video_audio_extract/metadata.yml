name: '视频抽取音频'
name_en: 'Video Audio Extract'
description: '从视频中抽取音频，默认输出 16k 单声道 wav，也可输出 aac，并生成 audio_info.json。'
description_en: 'Extract audio from video, default wav (16k mono), optionally aac, and generate audio_info.json.'
language: 'python'
vendor: 'huawei'
raw_id: 'VideoAudioExtract'
version: '1.0.0'
types:
  - 'cleaning'
modal: 'video'
effect:
  before: ''
  after: ''
inputs: 'video'
outputs: 'audio'
settings:
  sample_rate:
    name: '采样率'
    description: '输出音频采样率。'
    type: 'slider'
    defaultVal: 16000
    required: false
    min: 8000
    max: 48000
    step: 8000
  channels:
    name: '声道数'
    description: '输出音频声道数。'
    type: 'select'
    defaultVal: '1'
    required: false
    options:
      - label: '单声道'
        value: '1'
      - label: '双声道'
        value: '2'
  out_format:
    name: '输出格式'
    description: '选择输出音频格式。'
    type: 'select'
    defaultVal: 'wav'
    required: false
    options:
      - label: 'wav'
        value: 'wav'
      - label: 'aac'
        value: 'aac'
  ffmpeg_path:
    name: 'FFmpeg 路径'
    description: '留空时自动使用环境中的 ffmpeg。'
    type: 'input'
    defaultVal: ''
    required: false
