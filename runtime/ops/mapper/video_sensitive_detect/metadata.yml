name: '视频敏感检测'
name_en: 'Video Sensitive Detect'
description: '按抽帧调用 QwenVL 做敏感检测，输出 sensitive_segments.json。'
description_en: 'Sample frames and call QwenVL sensitive detection to output sensitive_segments.json.'
language: 'python'
vendor: 'huawei'
raw_id: 'VideoSensitiveDetect'
version: '1.0.0'
types:
  - 'annotation'
modal: 'video'
effect:
  before: ''
  after: ''
inputs: 'video'
outputs: 'text'
settings:
  sample_fps:
    name: '抽帧频率'
    description: '每秒抽取多少帧用于敏感检测。'
    type: 'slider'
    defaultVal: 1.0
    required: false
    min: 0.5
    max: 4.0
    step: 0.5
  threshold:
    name: '敏感阈值'
    description: '分数高于该阈值的命中会进入敏感片段。'
    type: 'slider'
    defaultVal: 0.5
    required: false
    min: 0.1
    max: 1.0
    step: 0.05
  merge_gap:
    name: '合并间隔秒数'
    description: '相邻命中小于该间隔时会合并成同一段。'
    type: 'slider'
    defaultVal: 1.5
    required: false
    min: 0.0
    max: 10.0
    step: 0.5
  pad_sec:
    name: '前后扩展秒数'
    description: '每个敏感片段前后扩展的秒数。'
    type: 'slider'
    defaultVal: 0.5
    required: false
    min: 0.0
    max: 5.0
    step: 0.5
  max_new_tokens:
    name: '最大生成长度'
    description: 'QwenVL 返回敏感判定时允许的最大 token 数。'
    type: 'slider'
    defaultVal: 8
    required: false
    min: 4
    max: 64
    step: 4
  timeout_sec:
    name: '超时秒数'
    description: '单帧调用 QwenVL 的超时时间。'
    type: 'slider'
    defaultVal: 180
    required: false
    min: 30
    max: 600
    step: 30
  service_url:
    name: 'Qwen 服务地址'
    description: '留空时读取环境变量，否则使用这里填写的地址。'
    type: 'input'
    defaultVal: 'http://qwen-vl-service:18080'
    required: false
