name: '视频字幕 OCR'
name_en: 'Video Subtitle OCR'
description: '识别视频底部字幕区域，输出 subtitles.json 与 subtitles.srt，并支持可选大模型纠错。'
description_en: 'Recognize bottom subtitles, output subtitles.json and subtitles.srt, with optional LLM correction.'
language: 'python'
vendor: 'huawei'
raw_id: 'VideoSubtitleOCR'
version: '1.0.0'
types:
  - 'annotation'
modal: 'video'
effect:
  before: ''
  after: ''
inputs: 'video'
outputs: 'text'
settings:
  preprocess_deborder:
    name: '先去黑边'
    description: '是否在 OCR 前先做黑边裁切。'
    type: 'switch'
    defaultVal: 'true'
    required: false
    checkedLabel: '开启'
    unCheckedLabel: '关闭'
  sample_fps:
    name: '抽帧频率'
    description: '每秒抽取多少帧用于字幕 OCR。'
    type: 'slider'
    defaultVal: 3.33
    required: false
    min: 0.5
    max: 10.0
    step: 0.5
  max_frames:
    name: '最大抽帧数'
    description: '限制最多参与 OCR 的帧数。'
    type: 'slider'
    defaultVal: 220
    required: false
    min: 20
    max: 1000
    step: 20
  subtitle_ratio:
    name: '字幕区域比例'
    description: '从底部截取多少比例作为字幕 ROI。'
    type: 'slider'
    defaultVal: 0.30
    required: false
    min: 0.1
    max: 0.5
    step: 0.05
  enable_min_score:
    name: '启用最小 OCR 分数'
    description: '关闭时不过滤低分 OCR 结果。'
    type: 'switch'
    defaultVal: 'false'
    required: false
    checkedLabel: '开启'
    unCheckedLabel: '关闭'
  min_score:
    name: '最小 OCR 分数'
    description: '低于该分数的 OCR 结果会被过滤。'
    type: 'slider'
    defaultVal: 0.15
    required: false
    min: 0.0
    max: 1.0
    step: 0.05
  enable_roi_diff_thr:
    name: '启用 ROI 差异阈值'
    description: '关闭时不按 ROI 变化过滤重复帧。'
    type: 'switch'
    defaultVal: 'false'
    required: false
    checkedLabel: '开启'
    unCheckedLabel: '关闭'
  roi_diff_thr:
    name: 'ROI 差异阈值'
    description: '相邻帧 ROI 变化低于该值时会跳过 OCR。'
    type: 'slider'
    defaultVal: 3.0
    required: false
    min: 0.0
    max: 20.0
    step: 0.5
  gap_merge_sec:
    name: '合并间隔秒数'
    description: '相邻字幕片段的最大合并时间间隔。'
    type: 'slider'
    defaultVal: 1.5
    required: false
    min: 0.0
    max: 5.0
    step: 0.5
  fix_english_space:
    name: '修复英文空格'
    description: '是否做英文字幕空格修复。'
    type: 'switch'
    defaultVal: 'true'
    required: false
    checkedLabel: '开启'
    unCheckedLabel: '关闭'
  enable_ocr_upscale:
    name: '启用 OCR 放大'
    description: '关闭时不做 OCR 放大。'
    type: 'switch'
    defaultVal: 'false'
    required: false
    checkedLabel: '开启'
    unCheckedLabel: '关闭'
  ocr_upscale:
    name: 'OCR 放大倍数'
    description: 'OCR 前对 ROI 的放大倍数。'
    type: 'slider'
    defaultVal: 1.5
    required: false
    min: 1.0
    max: 3.0
    step: 0.1
  ocr_sharpen:
    name: 'OCR 锐化'
    description: '是否在 OCR 前进行锐化。'
    type: 'switch'
    defaultVal: 'true'
    required: false
    checkedLabel: '开启'
    unCheckedLabel: '关闭'
  enable_ocr_contrast:
    name: '启用 OCR 对比度'
    description: '关闭时不做额外对比度增强。'
    type: 'switch'
    defaultVal: 'false'
    required: false
    checkedLabel: '开启'
    unCheckedLabel: '关闭'
  ocr_contrast:
    name: 'OCR 对比度'
    description: 'OCR 预处理时的对比度系数。'
    type: 'slider'
    defaultVal: 1.15
    required: false
    min: 0.8
    max: 2.0
    step: 0.05
  enable_ocr_brightness:
    name: '启用 OCR 亮度增量'
    description: '关闭时不做额外亮度增强。'
    type: 'switch'
    defaultVal: 'false'
    required: false
    checkedLabel: '开启'
    unCheckedLabel: '关闭'
  ocr_brightness:
    name: 'OCR 亮度增量'
    description: 'OCR 预处理时的亮度增量。'
    type: 'slider'
    defaultVal: 3
    required: false
    min: 0
    max: 20
    step: 1
  enable_llm_correction:
    name: '启用大模型修正'
    description: '对 OCR 生成的字幕文本做一次大模型纠错，只修正文本，不改时间轴。'
    type: 'switch'
    defaultVal: 'false'
    required: false
    checkedLabel: '开启'
    unCheckedLabel: '关闭'
  llm_service_url:
    name: '大模型服务地址'
    description: '留空时读取 QWEN_VL_ENDPOINT，否则使用这里填写的地址。'
    type: 'input'
    defaultVal: 'http://qwen-vl-service:18080'
    required: false
  llm_language:
    name: '纠错语言'
    description: 'auto 自动判断，zh 中文，en 英文。'
    type: 'select'
    defaultVal: 'auto'
    required: false
    options:
      - label: 'auto'
        value: 'auto'
      - label: 'zh'
        value: 'zh'
      - label: 'en'
        value: 'en'
  llm_timeout_sec:
    name: '大模型超时秒数'
    description: '调用字幕纠错服务的超时时间。'
    type: 'slider'
    defaultVal: 180
    required: false
    min: 30
    max: 600
    step: 30
  llm_max_new_tokens:
    name: '大模型最大生成长度'
    description: '字幕纠错时允许的最大生成 token 数。'
    type: 'slider'
    defaultVal: 1024
    required: false
    min: 128
    max: 2048
    step: 128
  ffmpeg_path:
    name: 'FFmpeg 路径'
    description: '留空时自动使用环境中的 ffmpeg。'
    type: 'input'
    defaultVal: ''
    required: false
